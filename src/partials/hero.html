<section class="section hero-section" id="home">
  <div class="hero-bg-wrapper">
    <div class="container hero-container">
      <div class="hero-content-wrapper">
        <picture>
          <source
            srcset="./img/hero/hero-title-desk.png"
            media="(min-width: 1440px)"
            width="428"
            height="396" />
          <source
            srcset="./img/hero/hero-title-mob.png"
            width="247"
            height="229" />
          <img
            class="hero-title-img"
            src="./img/hero/hero-title-mob.png"
            alt="Screenshot of the game"
            width="247"
            height="229"
        /></picture>
        <p class="hero-subtitle">
          Roll the Dice.<br />
          Claim Your Kingdom.
        </p>
        <p class="hero-text">
          Explore hundreds of boards, win treasures, and build your legend.
        </p>
        <a
          class="hero-btn"
          href="https://play.google.com/store/apps/details?id=com.inkgames.prizekingdoms&hl=en&gl=us"
          target="_blank"
          rel="noopener noreferrer"
        >
          <svg class="playstore-icon" width="30" height="34">
            <use href="./img/sprite.svg#icon-playstore"></use>
          </svg>
          <div class="hero-btn-text-wrapper">
            <p class="her-btn-top-text">GET IT ON</p>
            <p class="her-btn-bottom-text">Google Play</p>
          </div>
        </a>
      </div>
    </div>
    <picture>
      <source
        srcset="./img/hero/hero-img-desk.png"
        media="(min-width: 1440px)"
        width="681"
        height="414" />
      <source srcset="./img/hero/hero-img-mob.png" width="343" height="208" />
      <img
        class="hero-img"
        src="./img/hero/hero-img-mob.png"
        alt="Screenshot of the game"
        width="343"
        height="208"
    /></picture>
  </div>
</section>
